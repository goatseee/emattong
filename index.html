<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>鹅码通 - 扬州老鹅摊点管理平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:600px;width:100%;padding:40px 20px}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,#D4380D,#FF6B35);display:inline-flex;align-items:center;justify-content:center;font-size:36px;color:#fff;margin-bottom:12px}
.logo h1{font-size:24px;color:#111827;margin-bottom:4px}
.logo p{font-size:14px;color:#6b7280}
.cards{display:flex;flex-direction:column;gap:16px}
.card{background:#fff;border-radius:16px;padding:28px 24px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:all .2s;text-decoration:none;display:block;border:1.5px solid transparent}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-2px);border-color:#D4380D}
.card-h5:hover{border-color:#1a5632}
.card-header{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.card-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.card h2{font-size:18px;color:#111827}
.card p{font-size:13px;color:#6b7280;line-height:1.6}
.card .arrow{color:#d1d5db;font-size:20px;margin-left:auto}
.footer{text-align:center;margin-top:32px;font-size:12px;color:#9ca3af}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-icon">🪿</div>
    <h1>鹅码通</h1>
    <p>扬州老鹅摊点管理平台 · 原型演示</p>
  </div>
  <div class="cards">
    <a class="card card-h5" href="h5-prototype.html">
      <div class="card-header">
        <div class="card-icon" style="background:#d1fae5">📱</div>
        <div>
          <h2>H5 移动端</h2>
        </div>
        <span class="arrow">›</span>
      </div>
      <p>扫码公示 · 老鹅地图 · 摊主自助管理 · 执法现场检查<br>建议在手机端或浏览器开发者模式（F12）下预览</p>
    </a>
    <a class="card" href="pc-admin-prototype.html">
      <div class="card-header">
        <div class="card-icon" style="background:#dbeafe">🖥️</div>
        <div>
          <h2>PC 管理后台</h2>
        </div>
        <span class="arrow">›</span>
      </div>
      <p>数据看板 · 摊点档案 · 证照管理 · 检查管理 · 投诉反馈<br>建议在PC浏览器全屏模式下预览</p>
    </a>
  </div>
  <div class="footer">鹅码通 · 扬州老鹅摊点管理平台</div>
</div>
</body>
</html>
